<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta name="theme-color" content="#080808">
<title>انتخابات SL7 FC</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#080808}iframe{display:block;width:100%;height:100%;border:0;background:#080808}
</style>
</head>
<body>
<iframe id="election" title="انتخابات SL7 FC" src="../election-round2/?clean-secret=2"></iframe>
<script>
const frame=document.getElementById('election');
const emptyImage='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+A8AAQUBAScY42YAAAAASUVORK5CYII=';
function applyCleanSecretMode(){
  try{
    const doc=frame.contentDocument;
    const win=frame.contentWindow;
    if(!doc||!win)return;

    const stats=doc.querySelector('.stats');
    if(stats)stats.style.display='none';

    const heroText=doc.querySelector('.hero p');
    if(heroText)heroText.textContent='التصويت سري بالكامل. لا تظهر أعداد الأصوات أو المتصدر أو اختيارات المصوّتين للعامة، وتبقى التفاصيل متاحة للإدارة فقط.';

    const selfie=doc.getElementById('selfie');
    if(selfie){
      const field=selfie.parentElement&&selfie.parentElement.parentElement&&selfie.parentElement.parentElement.parentElement;
      if(field)field.style.display='none';
    }

    const consent=doc.getElementById('consent');
    if(consent)consent.checked=true;

    try{win.eval(`photo='${emptyImage}'`)}catch(e){}

    const note=doc.querySelector('.adminNote');
    if(note)note.innerHTML='النتائج والتفاصيل سرية ولا تظهر للعامة. يمكنك من هنا مراجعة أسماء المصوّتين واختياراتهم وفتح جولة جديدة عند الحاجة.';

    doc.querySelectorAll('table th:nth-child(2),table td:nth-child(2)').forEach(el=>el.style.display='none');
  }catch(e){console.error(e)}
}
frame.addEventListener('load',()=>{
  applyCleanSecretMode();
  setTimeout(applyCleanSecretMode,250);
  setTimeout(applyCleanSecretMode,900);
  setTimeout(applyCleanSecretMode,1800);
});
setInterval(applyCleanSecretMode,2000);
</script>
</body>
</html>
