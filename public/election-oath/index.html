<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>انتخابات SL7 FC</title><style>html,body{margin:0;height:100%;background:#080808}iframe{width:100%;height:100%;border:0;display:block}</style></head><body><iframe id="election" src="../election-face/"></iframe><script>const frame=document.getElementById('election');frame.addEventListener('load',()=>{const w=frame.contentWindow,d=frame.contentDocument;if(!w||!d||d.getElementById('oathBox'))return;const submit=d.getElementById('submit');const box=d.createElement('div');box.id='oathBox';box.style.cssText='grid-column:1/-1;border:1px solid #f1c23266;background:linear-gradient(145deg,#191400,#0d0b00);border-radius:18px;padding:18px 20px;box-shadow:0 10px 30px #0007';box.innerHTML='<div style="color:#ffd966;font-size:20px;font-weight:900;margin-bottom:10px">القَسَم والتعهد</div><label style="display:flex;gap:12px;align-items:flex-start;color:#fff;line-height:1.9;font-size:16px;cursor:pointer"><input id="oathCheck" type="checkbox" style="width:20px;height:20px;margin-top:7px;accent-color:#f1c232;flex:0 0 auto"><span><b>أقسم بالله العظيم</b> أنني لن أعبث بهذا التصويت، ولن أفسده، ولن أصوّت تصويتًا لا يرضي الله، وأن صوتي أمانة، وسأدلي به بصدق وعدل ونزاهة دون تزوير أو تلاعب.</span></label>';submit.parentElement.insertBefore(box,submit);const original=w.vote;w.vote=async function(){const oath=d.getElementById('oathCheck');if(!oath||!oath.checked){w.message('يجب قراءة القَسَم والموافقة عليه قبل اعتماد التصويت.','bad');box.scrollIntoView({behavior:'smooth',block:'center'});return}return original.apply(w,arguments)};});</script></body></html>
